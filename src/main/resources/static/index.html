<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Decision Fatigue DF</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <!-- Cute logo -->
    <div class="logo">
        <span>🎬</span> <span class="title">Decision Fatigue</span>
    </div>

    <!-- Genre input -->
    <div class="input-section">
        <input type="text" id="genre" placeholder="Enter genre (e.g., Sci-Fi)">
        <button id="getMovie">Get Recommendation</button>
    </div>

    <!-- Recommendation card -->
    <div id="recommendationCard" class="card hidden">
        <img id="poster" src="" alt="Movie Poster">
        <h2 id="movieTitle"></h2>
        <p id="movieOverview"></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
